<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usage Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
  />
  <style>
    :root {
      --bg: #181818;
      --panel: #202020;
      --panel-soft: #242424;
      --border: #393939;
      --text: #f2f2f2;
      --muted: #9d9d9d;
      --muted-2: #777;
      --purple: #7e56d8;
      --pink: #d94db5;
      --rose: #d85b7d;
      --yellow: #f3c628;
      --lime: #b6bd18;
      --orange: #f47721;
      --blue: #7568df;
      --green: #00ad5f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      font-size: 13px;
      line-height: 18px;
    }

    button {
      font: inherit;
      min-width: 80px;
      min-height: 32px;
      border-radius: 8px;
    }

    button.icon-button,
    button.select-control {
      min-width: wrap-content;
    }

    .ti {
      font-size: 24px;
      font-weight: 400;
      line-height: 1;
      stroke-width: 1.5px;
    }

    .usage-page {
      min-height: 100vh;
      background: var(--bg);
    }

    .page-title {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      background: #202020;
      border-bottom: 1px solid #3a3a3a;
      font-size: 22px;
      font-weight: 600;
      line-height: 1;
    }

    .toolbar {
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 6px 22px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }

    .filters,
    .toolbar-actions,
    .date-switcher {
      display: flex;
      align-items: center;
    }

    .filters {
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip,
    .date-switcher {
      height: 32px;
      border: 1px solid #555;
      background: #272727;
      color: #bdbdbd;
      border-radius: 999px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 10px;
      white-space: nowrap;
    }

    .chip-close {
      display: inline-grid;
      place-items: center;
      color: #898989;
      font-size: 20px;
      line-height: 1;
    }

    .ti-x,
    [class*="ti-chevron-"] {
      font-size: 20px;
      stroke-width: 1.5px;
    }

    .date-switcher {
      height: 32px;
      overflow: hidden;
    }

    .date-switcher button {
      width: 40px;
      min-width: 40px;
      min-height: 32px;
      height: 100%;
      display: inline-grid;
      place-items: center;
      padding: 0;
      border: 0;
      background: transparent;
      color: #9f9f9f;
      line-height: 1;
      cursor: pointer;
    }

    .date-switcher span {
      min-width: 74px;
      text-align: center;
      font-size: 11px;
      color: #c2c2c2;
    }

    .toolbar-actions {
      gap: 14px;
    }

    .icon-button {
      width: 40px;
      min-width: 40px;
      height: 40px;
      min-height: 40px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 0;
      background: transparent;
      color: #c8c8c8;
      cursor: pointer;
    }

    .icon-button .ti {
      font-size: 20px;
      line-height: 1;
      stroke-width: 1.5px;
    }

    .dashboard {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      height: 390px;
      min-height: 390px;
      background: var(--panel);
    }

    .main-panel {
      min-width: 0;
      height: 390px;
      padding: 14px 8px 10px;
      border-bottom: 1px solid #323232;
      position: relative;
      overflow: hidden;
    }

    .chart-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 0;
    }

    .metric-label {
      margin-bottom: 7px;
      color: #d2d2d2;
      font-size: 11px;
    }

    .metric-value {
      font-size: 15px;
      font-weight: 600;
      color: #f3f3f3;
    }

    .metric-sub {
      margin-top: 6px;
      color: #8f8f8f;
      font-size: 10px;
    }

    .chart-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #c0c0c0;
    }

    .select-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 32px;
      padding: 0 7px;
      border: 0;
      background: transparent;
      color: #c6c6c6;
      cursor: pointer;
    }

    .select-control .ti {
      font-size: 20px;
      line-height: 1;
      stroke-width: 1.5px;
    }

    .time-button {
      height: 32px;
      min-width: 80px;
      padding: 0 7px;
      border: 1px solid #343434;
      border-radius: 8px;
      background: #282828;
      color: #e0e0e0;
      cursor: pointer;
    }

    .chart-area {
      position: relative;
      height: 230px;
      width: 100%;
      margin: -1px auto 0;
      padding-top: 2px;
    }

    .grid-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 1px;
      border-top: 1px dashed #5a5a5a;
      opacity: .9;
    }

    .bars {
      position: absolute;
      inset: 9px 0 18px 0;
      display: grid;
      grid-template-columns: repeat(16, minmax(20px, 1fr));
      gap: 10px;
      align-items: end;
      padding: 0 8px;
    }

    .bar-column {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-width: 0;
    }

    .stack {
      display: flex;
      flex-direction: column-reverse;
      width: 100%;
      min-width: 16px;
      overflow: hidden;
      border-radius: 1px 1px 0 0;
    }

    .segment {
      width: 100%;
      min-height: 1px;
    }

    .seg-purple { background: var(--purple); }
    .seg-pink { background: var(--pink); }
    .seg-rose { background: var(--rose); }
    .seg-yellow { background: var(--yellow); }
    .seg-lime { background: var(--lime); }

    .x-label {
      position: absolute;
      bottom: 0;
      color: #8d8d8d;
      font-size: 10px;
    }

    .x-label.start {
      left: 31px;
    }

    .x-label.end {
      right: 5px;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: nowrap;
      overflow: hidden;
      position: absolute;
      right: 8px;
      bottom: 10px;
      left: 8px;
      padding: 0 8px;
      color: #b4b4b4;
      font-size: 9px;
      white-space: nowrap;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
    }

    .legend-dot {
      width: 5px;
      height: 5px;
      flex: 0 0 5px;
    }

    .legend-text {
      max-width: 124px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .side-panel {
      display: grid;
      grid-template-rows: 195px 195px;
      gap: 0;
      height: 390px;
      min-height: 390px;
      padding: 0;
      border-left: 1px solid var(--border);
      background: #1d1d1d;
    }

    .summary-card {
      min-height: 195px;
      height: 195px;
      display: flex;
      flex-direction: column;
      padding: 10px 8px 7px;
      background: #202020;
      border: 1px solid #323232;
      border-left: 0;
      border-top: 0;
      border-radius: 2px;
      overflow: hidden;
    }

    .summary-card + .summary-card {
      border-top: 0;
    }

    .summary-title {
      color: #9e9e9e;
      font-size: 10px;
      margin-bottom: 3px;
    }

    .summary-value {
      color: #f2f2f2;
      font-size: 13px;
      font-weight: 600;
    }

    .sparkline {
      width: 100%;
      height: 40px;
      margin: auto auto 0;
      display: block;
      overflow: visible;
    }

    .sparkline .baseline {
      stroke: #555;
      stroke-width: 1;
      opacity: .65;
    }

    .sparkline .line-orange {
      fill: none;
      stroke: var(--orange);
      stroke-width: 1.35;
    }

    .sparkline .line-pink {
      fill: none;
      stroke: var(--pink);
      stroke-width: 1.35;
    }

    .sparkline .end-dot {
      fill: #1d1d1d;
      stroke: var(--orange);
      stroke-width: 1.3;
    }

    .mini-bars {
      height: 46px;
      width: 100%;
      flex: 0 0 46px;
      margin: auto auto 0;
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      gap: 3px;
      align-items: end;
      border-bottom: 1px solid #666;
      padding-bottom: 2px;
    }

    .mini-bar {
      background: var(--blue);
      min-height: 3px;
      border-radius: 1px 1px 0 0;
    }

    @media (max-width: 760px) {
      .dashboard {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 0;
      }

      .main-panel {
        height: 390px;
      }

      .side-panel {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: 195px;
        height: 195px;
        min-height: 195px;
        padding: 0;
        border-left: 0;
        border-top: 0;
      }

      .summary-card + .summary-card {
        border-top: 1px solid #323232;
        border-left: 0;
      }

      .bars {
        gap: 5px;
      }

      .legend {
        justify-content: flex-start;
      }
    }

    @media (max-width: 480px) {
      .page-title {
        padding-inline: 14px;
      }

      .toolbar {
        align-items: flex-start;
        padding-inline: 12px;
      }

      .toolbar-actions {
        padding-top: 3px;
      }

      .side-panel {
        grid-template-columns: 1fr;
        grid-template-rows: 195px 195px;
        height: 390px;
        min-height: 390px;
      }

      .summary-card + .summary-card {
        border-top: 0;
        border-left: 1px solid #323232;
      }

      .summary-card:first-child {
        border-left: 1px solid #323232;
      }

      .chart-controls {
        gap: 4px;
      }
    }
  </style>
</head>
<body>
  <main class="usage-page">
    <header class="page-title">Usage</header>

    <section class="toolbar">
      <div class="filters">
        <div class="chip">
          <span>MISA aiSell</span>
          <span class="chip-close" aria-hidden="true"><i class="ti ti-x"></i></span>
        </div>

        <div class="chip">All API keys</div>

        <div class="date-switcher" aria-label="Chọn tháng">
          <button aria-label="Tháng trước"><i class="ti ti-chevron-left"></i></button>
          <span>July 2026</span>
          <button aria-label="Tháng sau"><i class="ti ti-chevron-right"></i></button>
        </div>
      </div>

      <div class="toolbar-actions">
        <button class="icon-button" aria-label="Làm mới">
          <i class="ti ti-refresh" aria-hidden="true"></i>
        </button>
        <button class="icon-button" aria-label="Tải xuống">
          <i class="ti ti-download" aria-hidden="true"></i>
        </button>
      </div>
    </section>

    <section class="dashboard">
      <section class="main-panel">
        <div class="chart-head">
          <div>
            <div class="metric-label">Total Spend</div>
            <div class="metric-value">$186.69</div>
            <div class="metric-sub">$15.56</div>
          </div>

          <div class="chart-controls">
            <button class="select-control">
              <span>Model</span>
              <i class="ti ti-chevron-down" aria-hidden="true"></i>
            </button>
            <button class="time-button">1d</button>
          </div>
        </div>

        <div class="chart-area">
          <div class="grid-line"></div>
          <div class="bars" id="mainChart"></div>
          <span class="x-label start">Jul 01</span>
          <span class="x-label end">Jul 16</span>
        </div>

        <div class="legend">
          <div class="legend-item">
            <span class="legend-dot seg-pink"></span>
            <span class="legend-text">gpt-4.1-2025-04-14, i...</span>
            <span>($81.074)</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot seg-purple"></span>
            <span class="legend-text">gpt-4.1-2025-04-14, c...</span>
            <span>($79.194)</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot seg-rose"></span>
            <span class="legend-text">gpt-4.1-2025-04-14, ...</span>
            <span>($10.732)</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot seg-yellow"></span>
            <span class="legend-text">gpt-4.1-mini-2025-0...</span>
            <span>($10.695)</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot seg-lime"></span>
            <span>2 other</span>
          </div>
        </div>
      </section>

      <aside class="side-panel">
        <article class="summary-card">
          <div class="summary-title">Total tokens</div>
          <div class="summary-value">236,451,477</div>
          <svg class="sparkline" viewBox="0 0 190 40" preserveAspectRatio="none" aria-hidden="true">
            <line class="baseline" x1="0" y1="34" x2="190" y2="34"></line>
            <path class="line-orange"
              d="M2 10 C10 15,16 18,23 15
                 S31 10,38 14
                 S49 12,58 11
                 S72 10,82 12
                 S94 15,105 13
                 S119 8,128 9
                 S139 14,148 12
                 S163 13,175 16
                 S184 18,188 28">
            </path>
            <path class="line-pink" d="M2 32 C50 31,78 32,110 32 S160 33,188 32"></path>
            <circle class="end-dot" cx="188" cy="28" r="2.5"></circle>
          </svg>
        </article>

        <article class="summary-card">
          <div class="summary-title">Total requests</div>
          <div class="summary-value" style="color:#7d70e8;">28,290</div>
          <div class="mini-bars" id="requestChart"></div>
        </article>
      </aside>
    </section>
  </main>

  <script>
    const spendData = [
      [37, 43, 6, 5, 1],
      [29, 34, 5, 4, 1],
      [28, 33, 5, 4, 1],
      [35, 39, 5, 4, 1],
      [16, 19, 3, 2, 1],
      [35, 39, 5, 4, 1],
      [36, 39, 5, 4, 1],
      [37, 40, 5, 4, 1],
      [35, 38, 5, 4, 1],
      [27, 31, 5, 4, 1],
      [30, 34, 5, 4, 1],
      [35, 39, 6, 5, 1],
      [39, 44, 6, 5, 1],
      [33, 36, 5, 4, 1],
      [32, 37, 5, 4, 1],
      [4, 4, 1, 1, 0]
    ];

    const segmentClasses = [
      "seg-purple",
      "seg-pink",
      "seg-rose",
      "seg-yellow",
      "seg-lime"
    ];

    const mainChart = document.getElementById("mainChart");

    spendData.forEach((values) => {
      const column = document.createElement("div");
      column.className = "bar-column";

      const stack = document.createElement("div");
      stack.className = "stack";

      values.forEach((value, index) => {
        const segment = document.createElement("div");
        segment.className = `segment ${segmentClasses[index]}`;
        segment.style.height = `${value * 2}px`;
        stack.appendChild(segment);
      });

      column.appendChild(stack);
      mainChart.appendChild(column);
    });

    const requestData = [32, 26, 28, 25, 12, 29, 27, 25, 22, 23, 27, 26, 23, 25, 21, 7];
    const requestChart = document.getElementById("requestChart");

    requestData.forEach((value) => {
      const bar = document.createElement("div");
      bar.className = "mini-bar";
      bar.style.height = `${value}px`;
      requestChart.appendChild(bar);
    });
  </script>
</body>
</html>
